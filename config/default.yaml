# AetherOS configuration (defaults).
#
# Zero-hardcoding principle: all tunable behavior is expressed here and loaded at
# runtime. Code reads from this config rather than embedding constants. Environment
# overrides use the prefix AETHER__ with double-underscore nesting, e.g.
# AETHER__GOVERNANCE__DEFAULT_BUDGET_MINOR=50000.

core:
  # ISO 4217 currency used when a budget currency is not otherwise specified.
  default_currency: "USD"
  # Hash algorithm used by the evidence ledger (informational; core uses SHA-256).
  ledger_hash: "sha256"

identity:
  # Default RFC3339 timestamp precision is seconds; identities are UTC.
  timezone: "UTC"

governance:
  # Default capability-lease time-to-live, in seconds (1 hour).
  default_lease_ttl_seconds: 3600
  # Default per-lease budget in minor currency units (cents) => $100.00.
  default_budget_minor: 10000
  # Whether human approval is required before high-impact actions.
  require_human_approval: true
  # Scopes considered high-impact and always requiring approval.
  high_impact_scopes:
    - "tool:*.write"
    - "tool:*.delete"
    - "infra:*.restart"
    - "infra:*.deploy"

memory:
  # Maximum entries retained in ephemeral task memory before summarization.
  ephemeral_max_entries: 200
  # Durable memory namespace prefix.
  durable_namespace: "org"

evidence:
  # Filesystem path (relative to data dir) for the persisted ledger.
  ledger_path: "data/evidence.ledger"

orchestration:
  # Maximum number of plan steps the intent compiler may emit.
  max_plan_steps: 25
  # Default model used for intent compilation (resolved by the runtime/env).
  default_model: "configured-by-runtime"

policy:
  # When no rule matches, deny by default (safe-by-default). Set true only for
  # permissive/dev environments.
  default_allow: false
  # High-impact actions require human approval even when policy allows them.
  require_approval_for_high_impact: true
  # Ordered rules; deny always overrides allow regardless of priority.
  rules:
    # Read-only data access is broadly permitted for any agent.
    - id: "allow-reads"
      effect: "allow"
      scope: "*:read:*"
      priority: 10
    # Observability/search tooling is permitted for any agent.
    - id: "allow-observability"
      effect: "allow"
      scope: "tool:*"
      priority: 5
    # Local analysis/compute (no external side effects) is permitted for any agent.
    - id: "allow-analysis"
      effect: "allow"
      scope: "analysis:*"
      priority: 5
    # Governed organizational memory access (reads and writes) is permitted; the
    # durable store separately enforces that the acting lease grants the record's
    # sensitivity scope (least privilege), so this rule only gates the action class.
    - id: "allow-memory"
      effect: "allow"
      scope: "memory:*"
      priority: 5
    # Infra mutations (restart/deploy) are allowed but only for agents that have
    # earned autonomy tier >= 1, and always gated by approval (high-impact).
    - id: "allow-infra-mutations-earned"
      effect: "allow"
      scope: "infra:*"
      min_autonomy_tier: 1
      priority: 20
    # Destructive deletes against production are never auto-permitted.
    - id: "deny-prod-delete"
      effect: "deny"
      scope: "*:delete:prod*"
      priority: 100

autonomy:
  # Consecutive successful governed runs needed to earn the next tier.
  promotion_threshold: 5
  # Maximum autonomy tier an agent can reach.
  max_tier: 3

transparency:
  # Witness-cosigning panel defending against split-view (equivocation) attacks on
  # the transparency log. Each independent witness retains the last tree head it
  # endorsed for a log and only cosigns a new head it can prove grew append-only
  # from the root it itself holds. A cosigned head is publicly trustworthy once at
  # least `witness_threshold` distinct witnesses endorse it.
  witness_count: 3
  # 0 selects a strict majority (n // 2 + 1) — the smallest panel that no single
  # equivocating witness can fool. Set explicitly to raise the bar.
  witness_threshold: 0

constitution:
  # The supreme governance layer. Articles are evaluated in the Rust core *before*
  # policy. A "forbid" is absolute — no policy allow and no autonomy tier overrides it.
  # A "require_approval" forces a human gate even if policy would have allowed silently.
  # The constitution can only ever tighten behaviour, never grant authority.
  version: "v1"
  articles:
    - id: "no-autonomous-prod-deletion"
      principle: "Production data must never be deleted by an agent without explicit human approval."
      verdict: "forbid"
      scope: "*:delete:prod*"
    - id: "no-credential-exfiltration"
      principle: "Agents must never exfiltrate secrets or credentials."
      verdict: "forbid"
      scope: "secrets:*"
    - id: "human-gate-high-impact-spend"
      principle: "Any high-impact action above the spend floor requires a human in the loop."
      verdict: "require_approval"
      high_impact: true
      min_cost_minor: 5000

storage:
  # Ledger durability backend (Phase 10). Controls whether evidence ledgers are
  # persisted to SQLite so they survive service restarts.
  #
  # "none"   — in-memory only (default, backward-compatible with all existing tests).
  # "sqlite" — persist each run's canonical ledger JSON after every append.
  #            Restores via EvidenceLedger.from_json(), which verifies the hash chain
  #            in Rust before the ledger is returned to any caller.
  backend: "none"
  # Directory for SQLite databases. One file per tenant (safe-named). Created on
  # first use. Has no effect when backend = "none".
  db_dir: "./ledgers"
  # ── Run-state durability (Phase 13) ──────────────────────────────────────
  # Whether resumable governed-run state (status, plan cursor, pending human
  # approval gate, results, and the signed lease + agent identities holding the
  # run's authority) survives a service restart. The signed lease is persisted with
  # its consumed-budget (spent_minor) and issuer signature intact, so a restored run
  # cannot forget how much budget it burned or have its authority silently re-minted.
  #
  # false  — run state in-memory only (default, backward-compatible with all tests).
  # true   — persist run state to SQLite after every state-machine transition and
  #          repopulate in-flight runs on startup. Pair with backend: "sqlite" above
  #          for a fully durable run (state + evidence ledger both survive).
  persist_runs: false
  # Directory for the per-tenant run-state SQLite databases.
  run_state_db_dir: "./run_states"
  # At-rest encryption passphrase for run-state SQLite blobs (Phase 16).
  # Empty = plaintext (default). Set AETHER__STORAGE__ENCRYPTION_PASSPHRASE in production.
  encryption_passphrase: ""

# ── Authentication (Phase 12) ──────────────────────────────────────────────
# JWT Bearer-token gate for the control-plane API.
# Set enabled: true and replace both secrets before any networked deployment.
auth:
  # Master switch. false = pass-through (default, all existing tests pass unchanged).
  enabled: false
  # Token signing algorithm: "HS256" (shared HMAC secret, default) or "EdDSA"
  # (asymmetric per-tenant Ed25519 tokens — RFC 8037; each tenant has its own
  # keypair so a leaked verifier key cannot forge another tenant's token).
  algorithm: "HS256"
  # HMAC-SHA256 signing secret for JWTs (HS256 only). Must be >= 32 bytes in production.
  secret: "change-me-before-production-at-least-32-bytes!!"
  # Secret presented at POST /auth/token to receive a JWT (separate from signing key).
  admin_secret: "admin-change-me"
  # JWT lifetime in seconds (default: 1 hour).
  token_ttl_seconds: 3600
  # Per-tenant Ed25519 keystore directory (EdDSA only). Empty = ephemeral in-memory
  # keys (dev/test); set a path for keys that survive restarts.
  token_keystore_dir: ""
  # Durable JWT revocation store directory (Phase 15). Empty = in-memory only
  # (revocations lost on restart, the default). Set a path so revoked tokens stay
  # revoked across restarts; the denylist self-prunes entries past their own expiry.
  revocation_store_dir: ""
  # At-rest encryption passphrase for per-tenant Ed25519 keystore PEM files (Phase 16).
  # Empty = plaintext PEM (default). Set AETHER__AUTH__KEYSTORE_PASSPHRASE in production.
  keystore_passphrase: ""

sandbox:
  # Execution backend for governed tool calls. "local" = in-process sandbox with a
  # timeout guard + egress control + provenance. A native/E2B backend drops in here.
  backend: "local"
  # Wall-clock timeout per tool call, in seconds.
  timeout_seconds: 10.0
  # Map of tool name -> external destination (used for egress checks).
  tool_destinations:
    service_restart: "infra.internal"
    slack_post: "slack.com"
  gateway:
    # Glob allowlist of permitted egress destinations for external tools.
    allow_destinations:
      - "slack.com"
      - "*.internal"
    # Tools that have external side effects and must pass egress checks.
    external_tools:
      - "service_restart"
      - "slack_post"
    # Treat any external tool without a declared destination as denied.
    deny_by_default: true

# ── Rate limiting (Phase 17) ──────────────────────────────────────────────
# Per-tenant, per-route sliding-window rate limiter for the control-plane API.
# Closes OWASP API Security Top 10 2023 API4: Unrestricted Resource Consumption.
# When enabled = false (default) the limiter is a transparent no-op and all
# prior behavior is unchanged. Set enabled: true and configure limits before
# any networked deployment.
rate_limit:
  # Master switch. false = no limiting (default, backward-compatible).
  enabled: false
  # Window duration in seconds for the sliding-window counter.
  window_seconds: 60
  # Default max requests per window for routes not in route_limits. 0 = disabled.
  default_limit: 0
  # Per-route limits (route_key: max_requests_per_window). 0 = disabled for that route.
  # Example production values:
  #   runs:create: 20          # max 20 run creations per tenant per minute
  #   runs:advance: 60         # max 60 advance calls per tenant per minute
  #   auth:token: 10           # max 10 token issuance attempts per minute
  #   auth:revoke: 20          # max 20 revocations per minute
  #   marketplace:publish: 5   # max 5 skill publishes per tenant per minute
  #   marketplace:install: 10  # max 10 skill installs per tenant per minute
  route_limits: {}
