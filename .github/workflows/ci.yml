name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -p aether-core -- -D warnings
      - name: Test core
        run: cargo test -p aether-core

  python:
    name: Python bindings + orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Create venv and install deps
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install maturin \
            "pydantic>=2.7,<3" pyyaml "pytest>=8" \
            "langgraph>=0.2" "mcp>=1.0" \
            "fastapi>=0.110" "uvicorn>=0.27" "httpx>=0.27" \
            "cryptography>=42" "PyJWT>=2.8" \
            "opentelemetry-sdk>=1.24" "opentelemetry-exporter-prometheus>=0.45b0" \
            "prometheus_client>=0.20"
      - name: Build native extension
        run: |
          . .venv/bin/activate
          cd bindings/aether-py && maturin develop --release
      - name: Install orchestrator
        run: |
          . .venv/bin/activate
          uv pip install -e python/ --no-deps
      - name: Run Python tests
        run: |
          . .venv/bin/activate
          python -m pytest python/tests/ bindings/aether-py/tests/ -q
      - name: Check OpenAPI spec is up to date
        run: |
          . .venv/bin/activate
          python scripts/generate_openapi.py --check

  ui:
    name: Desktop UI (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install UI deps
        run: cd ui && npm ci
      - name: Type-check and build
        run: cd ui && npm run build
